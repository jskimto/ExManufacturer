const CAT_COLORS={motor:'#2E75B6',valve:'#1E9DC8',switch:'#375623',sensor:'#7B3F9E',solenoid:'#C55A11',gas:'#C00000',vibration:'#767676'};
const CAT_LABELS={motor:'電動機・モータ',valve:'バルブ・制御器',switch:'制御盤・スイッチ',sensor:'センサ・計測器',solenoid:'電磁弁・電磁石',gas:'ガス検知器',vibration:'振動機器・その他'};

const map=L.map('map',{center:[36.5,137.0],zoom:6});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap contributors © CARTO',maxZoom:18}).addTo(map);

let markers={};

function createIcon(no,cat){
  const c=CAT_COLORS[cat]||'#888';
  const sz=no<=10?28:(no<=30?26:24);
  const fs=sz<=24?'9px':'10px';
  return L.divIcon({className:'',
    html:`<div class="custom-icon" style="width:${sz}px;height:${sz}px;background:${c};font-size:${fs}">${no}</div>`,
    iconSize:[sz,sz],iconAnchor:[sz/2,sz/2],popupAnchor:[0,-sz/2]});
}

function makePopup(c){
  return `<div class="popup-num">No.${c.no}</div>
<div class="popup-title">${c.name}</div>
<div class="popup-sub">
  🏭 ${c.short}<br>
  📋 合格件数：約${c.count}件<br>
  🏷️ ${CAT_LABELS[c.cat]}
</div>
<div class="popup-addr">📍 ${c.addr}</div>
<div class="popup-url">🔗 <a href="${c.url}" target="_blank" rel="noopener">${c.url}</a></div>`;
}

function addMarkers(data){
  data.forEach(c=>{
    const m=L.marker([c.lat,c.lng],{icon:createIcon(c.no,c.cat)});
    m.bindPopup(makePopup(c),{maxWidth:320});
    m.on('click',()=>highlightSidebarItem(c.no));
    m.addTo(map);
    markers[c.no]={marker:m,data:c};
  });
}
addMarkers(COMPANIES);

function buildSidebar(data){
  const list=document.getElementById('company-list');
  list.innerHTML='';
  document.getElementById('sidebar-title').textContent=`申請者一覧（${data.length}社）`;
  data.forEach(c=>{
    const item=document.createElement('div');
    item.className='company-item';
    item.id=`item-${c.no}`;
    const col=CAT_COLORS[c.cat]||'#888';
    item.innerHTML=`
      <div class="num-badge" style="background:${col}">${c.no}</div>
      <div class="company-info">
        <div class="company-name">${c.name}</div>
        <div class="company-sub">${c.short} | 合格件数 約${c.count}件 | ${CAT_LABELS[c.cat]}</div>
        <div class="company-addr">📍 ${c.addr}</div>
        <div class="company-url">🔗 <a href="${c.url}" target="_blank" rel="noopener">${c.url}</a></div>
      </div>`;
    item.onclick=()=>{
      map.flyTo([c.lat,c.lng],11,{duration:1});
      markers[c.no].marker.openPopup();
      highlightSidebarItem(c.no);
    };
    list.appendChild(item);
  });
}
buildSidebar(COMPANIES);

function highlightSidebarItem(no){
  document.querySelectorAll('.company-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById(`item-${no}`);
  if(el){el.classList.add('active');el.scrollIntoView({behavior:'smooth',block:'nearest'});}
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('hidden');
}

function filterByCategory(){
  const cat=document.getElementById('filter').value;
  const filtered=cat==='all'?COMPANIES:COMPANIES.filter(c=>c.cat===cat);
  Object.values(markers).forEach(({marker})=>map.removeLayer(marker));
  markers={};
  addMarkers(filtered);
  buildSidebar(filtered);
  document.getElementById('count-badge').textContent=`${filtered.length}社表示中`;
  if(filtered.length>0){
    const b=L.latLngBounds(filtered.map(c=>[c.lat,c.lng]));
    map.fitBounds(b,{padding:[40,40]});
  }
}
</script>
