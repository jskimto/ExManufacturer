*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif;background:#0D2B45;color:#fff}

.badge{background:#1E9DC8;color:#fff;font-size:.72rem;font-weight:700;padding:4px 12px;border-radius:999px;white-space:nowrap}

#sidebar-header{padding:14px 16px;background:rgba(30,157,200,.15);border-bottom:1px solid rgba(30,157,200,.2);display:flex;justify-content:space-between;align-items:center}

#close-btn{background:none;border:none;color:#90c4e0;cursor:pointer;font-size:1.2rem;padding:2px 6px}
#company-list{padding:8px}
.company-item{padding:10px 12px;border-bottom:1px solid rgba(30,157,200,.12);cursor:pointer;transition:background .2s;display:flex;align-items:flex-start;gap:10px}
.company-item:hover{background:rgba(30,157,200,.12)}
.company-item.active{background:rgba(30,157,200,.2)}
.num-badge{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;flex-shrink:0;margin-top:1px}
.company-info{flex:1;min-width:0}
.company-name{font-size:.82rem;font-weight:600;color:#fff;line-height:1.3}
.company-sub{font-size:.7rem;color:#90c4e0;margin-top:2px;line-height:1.4}
.company-pref{font-size:.68rem;color:#1E9DC8;font-weight:600;margin-top:2px}
/* 凡例 */
#legend{position:absolute;bottom:20px;left:16px;z-index:1000;background:rgba(13,43,69,.9);border:1px solid rgba(30,157,200,.3);border-radius:8px;padding:10px 14px;font-size:.72rem;color:#90c4e0;min-width:160px}
#legend h3{font-size:.75rem;font-weight:700;color:#1E9DC8;margin-bottom:8px}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.legend-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;border:2px solid rgba(255,255,255,.3)}
/* カスタムマーカー */
.custom-icon{display:flex;align-items:center;justify-content:center;border-radius:50%;border:2px solid rgba(255,255,255,.7);font-weight:700;color:#fff;font-size:.65rem;box-shadow:0 2px 8px rgba(0,0,0,.4);cursor:pointer;transition:transform .2s}
.custom-icon:hover{transform:scale(1.2)}
/* ポップアップ */
.leaflet-popup-content-wrapper{background:#0D2B45;border:1.5px solid #1E9DC8;border-radius:8px;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.leaflet-popup-tip{background:#0D2B45}
.popup-title{font-size:.85rem;font-weight:700;color:#1E9DC8;margin-bottom:4px}
.popup-sub{font-size:.75rem;color:#90c4e0;line-height:1.5}
.popup-num{font-size:.65rem;background:#1E9DC8;color:#fff;padding:2px 8px;border-radius:999px;display:inline-block;margin-bottom:6px}

});

  maxZoom: 18
}).addTo(map);

// マーカー管理
let markers = {};
let currentFilter = 'all';

function createIcon(no, cat) {
  const color = CAT_COLORS[cat] || '#888';
  const size = no <= 10 ? 28 : (no <= 30 ? 26 : 24);
  return L.divIcon({
    className: '',
    html: `<div class="custom-icon" style="width:${size}px;height:${size}px;background:${color};font-size:${size<=24?'.6rem':'.65rem'}">${no}</div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2],
    popupAnchor: [0, -size/2]
  });
}

function addMarkers(data) {
  data.forEach(c => {
    const marker = L.marker([c.lat, c.lng], { icon: createIcon(c.no, c.cat) });
    marker.bindPopup(`
      <div class="popup-num">No.${c.no}</div>
      <div class="popup-title">${c.name}</div>
      <div class="popup-sub">
        📍 ${c.pref}<br>
        🏭 ${c.short}<br>
        📋 TIIS合格件数：約${c.count}件<br>
        🏷️ ${CAT_LABELS[c.cat]}
      </div>
    `, { maxWidth: 280 });
    marker.on('click', () => highlightSidebarItem(c.no));
    marker.addTo(map);
    markers[c.no] = { marker, data: c };
  });
}

addMarkers(COMPANIES);

// サイドバー
function buildSidebar(data) {
  const list = document.getElementById('company-list');
  list.innerHTML = '';
  data.forEach(c => {
    const item = document.createElement('div');
    item.className = 'company-item';
    item.id = `item-${c.no}`;
    const color = CAT_COLORS[c.cat] || '#888';
    item.innerHTML = `
      <div class="num-badge" style="background:${color}">${c.no}</div>
      <div class="company-info">
        <div class="company-name">${c.name}</div>
        <div class="company-sub">${c.short} | 合格件数 約${c.count}件</div>
        <div class="company-pref">📍 ${c.pref} — ${CAT_LABELS[c.cat]}</div>
      </div>`;
    item.onclick = () => {
      map.flyTo([c.lat, c.lng], 11, { duration: 1 });
      markers[c.no].marker.openPopup();
      highlightSidebarItem(c.no);
    };
    list.appendChild(item);
  });
}
buildSidebar(COMPANIES);

function highlightSidebarItem(no) {
  document.querySelectorAll('.company-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`item-${no}`);
  if (el) { el.classList.add('active'); el.scrollIntoView({ behavior:'smooth', block:'nearest' }); }
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('hidden');
}

// フィルタ
function filterByCategory() {
  currentFilter = document.getElementById('filter').value;
  const filtered = currentFilter === 'all' ? COMPANIES : COMPANIES.filter(c => c.cat === currentFilter);

  Object.values(markers).forEach(({ marker }) => map.removeLayer(marker));
  markers = {};
  addMarkers(filtered);
  buildSidebar(filtered);
  document.getElementById('count-badge').textContent = `${filtered.length}社表示中`;

  if (filtered.length > 0) {
    const bounds = L.latLngBounds(filtered.map(c => [c.lat, c.lng]));
    map.fitBounds(bounds, { padding: [40, 40] });
  }
}
</script>
</body>
</html>
